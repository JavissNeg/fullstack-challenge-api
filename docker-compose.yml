version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: flights_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: flights_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d flights_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: mecate_api
    ports:
      - "8443:8443"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://user:password@postgres:5432/flights_db
      DEBUG: "True"
    volumes:
      - .:/src

volumes:
  postgres_data: